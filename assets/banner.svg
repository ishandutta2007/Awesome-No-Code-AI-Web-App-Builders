<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0c0d34" />
      <stop offset="100%" stop-color="#1a0b2e" />
    </linearGradient>

    <!-- Glowing Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Glowing Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#ffaf40" />
    </linearGradient>

    <!-- Dynamic Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- CSS Animation Styles -->
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.08); opacity: 0.7; }
      100% { transform: scale(1); opacity: 0.4; }
    }
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    @keyframes float-reverse {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(12px) rotate(-3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .orb-1 {
      animation: float 8s ease-in-out infinite;
      transform-origin: 200px 150px;
    }
    .orb-2 {
      animation: float-reverse 10s ease-in-out infinite;
      transform-origin: 900px 250px;
    }
    .pulse-glow {
      animation: pulse 4s ease-in-out infinite;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800;
      font-size: 48px;
      fill: url(#textGrad);
    }
    .subtitle-text {
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 400;
      font-size: 18px;
      fill: #a0aec0;
      letter-spacing: 2px;
    }
    .badge-pill {
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 600;
      font-size: 14px;
      fill: #ffffff;
    }
  </style>

  <!-- Background Base -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="20" />

  <!-- Animated Glowing Orbs (Dynamic Background Elements) -->
  <g class="orb-1">
    <circle cx="200" cy="150" r="180" fill="url(#blueGrad)" opacity="0.3" filter="url(#glow)" />
  </g>
  <g class="orb-2">
    <circle cx="1000" cy="220" r="160" fill="url(#purpleGrad)" opacity="0.25" filter="url(#glow)" />
  </g>

  <!-- Modern Grid Overlay for Tech Vibe -->
  <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
  <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />

  <!-- Content Group -->
  <g transform="translate(80, 140)">
    <!-- Tech Badge -->
    <g transform="translate(0, 0)">
      <rect x="0" y="-35" width="220" height="34" rx="17" fill="#1b1c4b" stroke="#4facfe" stroke-width="1.5" stroke-opacity="0.6" class="pulse-glow" />
      <circle cx="18" cy="-18" r="6" fill="#00f2fe" />
      <text x="36" y="-13" class="badge-pill">NEXT-GEN BUILDERS</text>
    </g>

    <!-- Main Title -->
    <text x="0" y="55" class="title-text" filter="url(#softGlow)">Awesome No-Code AI Web App Builders</text>

    <!-- Subtitle -->
    <text x="0" y="105" class="subtitle-text">A CURATED LIST OF SAAS PLATFORMS &amp; OPEN-SOURCE PROJECTS</text>

    <!-- Divider Line -->
    <line x1="0" y1="130" x2="350" y2="130" stroke="#4facfe" stroke-width="2" stroke-opacity="0.8" />
  </g>
</svg>
